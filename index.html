<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>REDNET - TABAC MANAGEMENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { background-color: #1e293b; border-right: 2px solid #e11d48; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
        .btn-sell { background-color: #e11d48; transition: 0.3s; }
        .btn-sell:hover { background-color: #be123c; transform: scale(1.05); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <div class="w-64 sidebar flex flex-col p-6">
        <div class="text-2xl font-bold text-white mb-10">
            RED<span class="text-rose-600">NET</span> <br>
            <span class="text-xs uppercase text-slate-400">Tabac Division</span>
        </div>
        <nav class="space-y-4">
            <div class="p-3 bg-slate-800 rounded-lg text-rose-500">🛒 Terminal de Vente</div>
            <div class="p-3 hover:bg-slate-700 rounded-lg cursor-pointer">📦 Stocks</div>
            <div class="p-3 hover:bg-slate-700 rounded-lg cursor-pointer">👥 Clients</div>
        </nav>
        <div class="mt-auto text-xs text-slate-500 font-mono">Session : Draven Horadrique</div>
    </div>

    <main class="flex-1 p-10 overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-bold">Terminal de Vente</h1>
            <div class="text-right">
                <p class="text-slate-400 text-sm">Caisse du jour</p>
                <p class="text-2xl font-bold text-green-400">$ 0.00</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="card p-6 rounded-xl flex flex-col gap-4">
                <div class="text-4xl text-center">🚬</div>
                <div>
                    <h3 class="font-bold text-lg text-white">Paquet Redwood</h3>
                    <p class="text-rose-500 font-mono">$ 15.00</p>
                </div>
                <button class="btn-sell w-full py-2 rounded-lg font-bold">VENDRE</button>
            </div>
            <div class="card p-6 rounded-xl flex flex-col gap-4">
                <div class="text-4xl text-center">🍂</div>
                <div>
                    <h3 class="font-bold text-lg text-white">Cigare Cubain</h3>
                    <p class="text-rose-500 font-mono">$ 45.00</p>
                </div>
                <button class="btn-sell w-full py-2 rounded-lg font-bold">VENDRE</button>
            </div>
            <div class="card p-6 rounded-xl flex flex-col gap-4">
                <div class="text-4xl text-center">🔥</div>
                <div>
                    <h3 class="font-bold text-lg text-white">Briquet Zippo</h3>
                    <p class="text-rose-500 font-mono">$ 5.00</p>
                </div>
                <button class="btn-sell w-full py-2 rounded-lg font-bold">VENDRE</button>
            </div>
        </div>
    </main>
</body>
</html>
