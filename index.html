<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>REDNET - TABAC CLOUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-white p-10 font-sans">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-rose-500">TABACNET INTERFACE <span class="text-white text-sm">v4.0</span></h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                <h2 class="text-xl mb-4 font-bold">Terminal de Vente</h2>
                <div id="liste-produits" class="space-y-4">
                    Chargement des produits...
                </div>
            </div>

            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                <h2 class="text-xl mb-4 font-bold">Stocks en Temps Réel</h2>
                <div id="table-stocks" class="text-sm">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION SUPABASE ---
        const SUPABASE_URL = knmiqpuhnvmzdhmxlazc;
        const SUPABASE_KEY = sb_publishable_Zx7hBti28uEbXkxieNjvkg_Yp_P8IwZ;
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // FONCTION POUR CHARGER LES PRODUITS
        async function loadData() {
            const { data, error } = await supabase.from('stocks').select('*');
            if (error) console.error(error);

            // Mise à jour de la liste de vente
            const listeProd = document.getElementById('liste-produits');
            listeProd.innerHTML = data.map(p => `
                <div class="flex justify-between items-center p-3 bg-slate-700 rounded-lg">
                    <span>${p.nom} ($${p.prix})</span>
                    <button onclick="vendre('${p.id}', ${p.quantite})" class="bg-rose-600 px-4 py-1 rounded hover:bg-rose-500 transition">VENDRE</button>
                </div>
            `).join('');

            // Mise à jour du tableau des stocks
            const tableStocks = document.getElementById('table-stocks');
            tableStocks.innerHTML = data.map(p => `
                <div class="flex justify-between py-2 border-b border-slate-700">
                    <span>${p.nom}</span>
                    <span class="${p.quantite < 10 ? 'text-red-500 font-bold' : 'text-green-400'}">${p.quantite} en stock</span>
                </div>
            `).join('');
        }

        // FONCTION POUR VENDRE
        async function vendre(id, currentQty) {
            if (currentQty <= 0) return alert("Plus de stock !");
            
            const { error } = await supabase
                .from('stocks')
                .update({ quantite: currentQty - 1 })
                .eq('id', id);

            if (!error) loadData(); // Rafraîchir l'affichage
        }

        loadData();
    </script>
</body>
</html>
